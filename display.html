<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>מסך הקרנה — כנס פתיחה עתידים מחזור כה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --white:#fff; --off:#F0F6FF; --paper:#E4EFF9;
  --navy:#1A2A5E; --navy2:#0F1D44;
  --cyan:#00B4E6; --cyan-d:rgba(0,180,230,.14); --cyan-b:rgba(0,180,230,.08); --cyan-r:rgba(0,180,230,.4);
  --mag:#E800C8; --mag-d:rgba(232,0,200,.13); --mag-r:rgba(232,0,200,.45);
  --grid:rgba(0,120,200,.085);
  --ff:'Heebo',sans-serif; --fm:'IBM Plex Mono',monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
html, body { height:100%; overflow:hidden; background:var(--white); color:var(--navy); font-family:var(--ff) }

/* white + blue grid */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:42px 42px;
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,180,230,.06) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 0% 100%, rgba(26,42,94,.04) 0%, transparent 50%);
}

/* ── TOP BAR ── */
#topBar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 32px 8px;
  background:var(--navy);
  border-bottom:3px solid var(--cyan);
}
.tb-logos { display:flex; align-items:center; gap:12px }
.tb-bird  { height:46px; object-fit:contain; filter:brightness(0) invert(1) }
.tb-div   { width:1px; height:34px; background:rgba(255,255,255,.2); flex-shrink:0 }
.tb-hiaat { height:38px; object-fit:contain; filter:brightness(0) invert(1) }

.tb-center { text-align:center }
.tb-title  { font-size:clamp(11px,1.4vw,15px); font-weight:700; color:var(--white); letter-spacing:.06em; line-height:1.3 }
.tb-sub    { font-size:clamp(9px,1vw,12px); color:rgba(255,255,255,.45); font-family:var(--fm); letter-spacing:.1em; margin-top:2px }

.tb-right { display:flex; align-items:center; gap:16px; flex-shrink:0 }
.tb-count-wrap { text-align:center }
.tb-count {
  font-size:clamp(28px,4.5vw,52px); font-weight:900; color:var(--cyan); line-height:1;
  text-shadow:0 0 20px rgba(0,180,230,.35);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
}
.tb-count.pop { transform:scale(1.35) }
.tb-count-sub { font-family:var(--fm); font-size:9px; color:rgba(255,255,255,.4); letter-spacing:.12em; margin-top:2px }
.tb-live {
  display:flex; align-items:center; gap:6px;
  font-family:var(--fm); font-size:11px; color:var(--cyan);
}
.tb-live::before {
  content:''; width:8px; height:8px; background:var(--cyan); border-radius:50%;
  box-shadow:0 0 10px var(--cyan); animation:pulse 1.5s infinite;
}
.tb-time { font-family:var(--fm); font-size:13px; color:rgba(255,255,255,.35) }
.tb-export {
  background:rgba(0,180,230,.15); border:1px solid rgba(0,180,230,.35);
  border-radius:8px; padding:7px 14px; font-size:12px; font-weight:700;
  color:var(--cyan); cursor:pointer; font-family:var(--ff); transition:all .2s;
}
.tb-export:hover { background:rgba(0,180,230,.3) }

/* ── MOSAIC STAGE ── */
#stage {
  position:fixed; top:80px; left:0; right:0; bottom:64px; z-index:1;
  padding:20px 24px; overflow:hidden;
}
.mosaic {
  display:flex; flex-wrap:wrap; gap:clamp(7px,.9vw,12px);
  align-content:flex-start; height:100%; overflow:hidden;
}
.chip {
  font-family:var(--ff); font-size:clamp(13px,1.6vw,18px); font-weight:700;
  padding:clamp(7px,.8vw,10px) clamp(14px,1.5vw,20px);
  border-radius:9px; white-space:nowrap; cursor:default;
  animation:chipIn .6s cubic-bezier(.34,1.56,.64,1) both; border:2px solid;
  position:relative; overflow:visible;
}
.chip.fresh {
  background:var(--cyan-d); border-color:var(--cyan-r); color:var(--navy);
  box-shadow:0 0 20px rgba(0,180,230,.18);
  animation:chipIn .5s cubic-bezier(.34,1.56,.64,1) both, chipSettle 4s ease 1s forwards;
}
.chip.c1 { background:rgba(26,42,94,.07); border-color:rgba(26,42,94,.16); color:var(--navy) }
.chip.c2 { background:rgba(232,0,200,.07); border-color:rgba(232,0,200,.22); color:#8B006F }
.chip.c3 { background:var(--cyan-b); border-color:rgba(0,180,230,.22); color:#006E9B }
.chip.c4 { background:var(--paper); border-color:rgba(26,42,94,.12); color:rgba(26,42,94,.55) }
/* hover tooltip shows future */
.chip[data-future]:hover::after {
  content:attr(data-future);
  position:absolute; bottom:calc(100% + 8px); right:0;
  background:var(--navy); color:var(--cyan);
  font-size:13px; font-weight:600; font-style:italic;
  padding:8px 14px; border-radius:10px; white-space:nowrap;
  border:1px solid rgba(0,180,230,.35); pointer-events:none; z-index:200;
  box-shadow:0 6px 20px rgba(26,42,94,.25);
  max-width:360px; white-space:normal; text-align:right;
}

/* ── BOTTOM BAR ── */
#botBar {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:9px 28px;
  background:var(--navy); border-top:2px solid rgba(0,180,230,.3);
}
.bb-qr-row { display:flex; align-items:center; gap:10px }
#qrBox { background:#fff; border-radius:7px; padding:5px; flex-shrink:0; border:2px solid var(--cyan-r) }
.bb-qr-text { font-family:var(--fm); font-size:11px; color:rgba(255,255,255,.5); line-height:1.65 }
.bb-qr-text strong { display:block; color:var(--cyan); font-size:12px; margin-bottom:2px }
.bb-mid { text-align:center; flex:1 }
.bb-slo { font-size:clamp(13px,1.8vw,18px); font-weight:900; color:var(--white) }
.bb-slo .c { color:var(--cyan) }
.bb-url { font-family:var(--fm); font-size:10px; color:rgba(255,255,255,.28); margin-top:2px }
.bb-fs {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15);
  border-radius:8px; padding:7px 14px; font-size:12px; color:rgba(255,255,255,.5);
  cursor:pointer; font-family:var(--ff); transition:all .2s; white-space:nowrap; flex-shrink:0;
}
.bb-fs:hover { border-color:var(--cyan); color:var(--cyan) }

/* ── SPOTLIGHT ── */
#spotlight {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background:rgba(240,247,255,.97);
  opacity:0; pointer-events:none; transition:opacity .4s ease;
}
#spotlight.on { opacity:1; pointer-events:all }

.spl-rays { position:absolute; inset:0; overflow:hidden; pointer-events:none }
.spl-ray {
  position:absolute; bottom:50%; left:50%; width:2px;
  transform-origin:bottom center;
  background:linear-gradient(to top, rgba(0,180,230,.2), transparent);
  animation:rayIn 1s ease-out both;
}
.spl-prts { position:absolute; inset:0; pointer-events:none; overflow:hidden }
.spp { position:absolute; border-radius:50%; animation:ptFly linear forwards }

.spl-card {
  position:relative; z-index:2;
  background:var(--navy); border-radius:28px;
  padding:clamp(28px,4vw,56px) clamp(36px,6vw,80px);
  text-align:center; max-width:min(960px,92vw);
  box-shadow:0 32px 80px rgba(26,42,94,.35);
  overflow:hidden;
  animation:cardIn .6s cubic-bezier(.16,1,.3,1) both;
}
/* grid inside card */
.spl-card::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,180,230,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,230,.05) 1px,transparent 1px);
  background-size:36px 36px;
}
/* cyan left stripe */
.spl-card::after {
  content:''; position:absolute; top:0; left:0; bottom:0; width:7px;
  background:linear-gradient(to bottom, var(--cyan), rgba(0,180,230,.3));
  border-radius:0 0 0 28px;
}
/* glow overlay */
.spl-glow {
  position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(135deg, rgba(0,180,230,.1) 0%, transparent 50%);
}

.spl-logo {
  height:clamp(32px,4vw,54px); object-fit:contain;
  filter:brightness(0) invert(1);
  margin-bottom:18px; position:relative; z-index:1;
  animation:fadeUp .4s ease both;
}
.spl-welcome {
  font-family:var(--fm); font-size:clamp(10px,1.4vw,14px);
  letter-spacing:.28em; color:var(--cyan);
  margin-bottom:14px; position:relative; z-index:1;
  animation:fadeUp .35s ease .05s both;
}
.spl-name {
  font-size:clamp(52px,12vw,140px); font-weight:900; line-height:.92;
  margin-bottom:22px; position:relative; z-index:1;
  animation:nameBlast .65s cubic-bezier(.16,1,.3,1) .1s both;
}
.spl-name-first { display:block; color:var(--cyan) }
.spl-name-last  { display:block; color:var(--white) }

.spl-future {
  background:rgba(0,180,230,.12); border:1.5px solid rgba(0,180,230,.35);
  border-radius:14px; padding:14px 22px;
  margin-bottom:22px; position:relative; z-index:1;
  animation:fadeUp .4s ease .45s both;
}
.spl-future-lbl {
  font-family:var(--fm); font-size:clamp(9px,1.1vw,13px);
  letter-spacing:.2em; color:rgba(0,180,230,.7); margin-bottom:5px;
}
.spl-future-txt {
  font-size:clamp(17px,2.8vw,34px); font-weight:700;
  color:var(--white); font-style:italic; line-height:1.25;
}

.spl-tags {
  display:flex; justify-content:center; gap:clamp(10px,2vw,18px); flex-wrap:wrap;
  position:relative; z-index:1; animation:fadeUp .4s ease .6s both;
}
.spl-tag {
  font-size:clamp(13px,2vw,22px); font-weight:700;
  padding:9px clamp(16px,2.5vw,32px); border-radius:9px; border:2px solid;
}
.spl-tag.a { background:var(--cyan-d);         border-color:var(--cyan);           color:var(--white) }
.spl-tag.b { background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.22); color:var(--white) }
.spl-tag.c { background:var(--mag-d);          border-color:var(--mag-r);          color:#FF66E8 }

/* ── KEYFRAMES ── */
@keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:.25} }
@keyframes chipIn     { from{opacity:0;transform:scale(.5) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes chipSettle { 0%{background:var(--cyan-d);border-color:var(--cyan-r);color:var(--navy)} 100%{background:rgba(26,42,94,.07);border-color:rgba(26,42,94,.16);color:var(--navy)} }
@keyframes fadeUp     { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes nameBlast  { from{opacity:0;transform:scale(.28)} to{opacity:1;transform:scale(1)} }
@keyframes cardIn     { from{opacity:0;transform:scale(.8) translateY(32px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes rayIn      { from{height:0;opacity:0} to{height:56vh;opacity:1} }
@keyframes ptFly      { 0%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0)} }
::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-thumb{background:rgba(0,120,200,.2);border-radius:3px}
</style>
</head>

      <span class="c">חיבורים</span>
    </div>
  </div>
  <button class="bb-fs" onclick="goFS()">&#x26F6; מסך מלא</button>
</footer>

  function injectLogos() {
    document.getElementById("tbBird").src   = BIRD;
    document.getElementById("tbHiaat").src  = HIAAT;
    document.getElementById("splLogo").src  = HIAAT;
  }

  /* ── Init Firebase ── */
  var db;
  try {
    if (typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
    firebase.initializeApp(FB);
    db = firebase.database();
    console.log('Firebase connected OK');
  } catch(e) {
    console.error("Firebase init error:", e);
    document.getElementById("tbTime").textContent = "DB ERROR";
    document.getElementById("tbTime").style.color = "#ff4444";
  }

  /* ── State ── */
  var known = {}, spotQ = [], busy = false;
  var styles = ["c1","c1","c4","c2","c3","c1","c4","c2","c3","c4"]; var sci = 0;
  var allRegs = [];

  /* ── Clock ── */
  function ftime(d){ return d.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}); }
  function tick(){ document.getElementById("tbTime").textContent = ftime(new Date()); }
  tick(); setInterval(tick, 1000);

  /* ── Counter ── */
  function setCount(n){
    var el = document.getElementById("tbCount"); if(!el) return;
    el.textContent = n; el.classList.add("pop");
    setTimeout(function(){ el.classList.remove("pop"); }, 300);
  }

  /* ── QR ── */
  function drawQR(){
    try { new QRCode(document.getElementById("qrBox"),{
      text:"https://atidim-1.github.io/kenes2026/",
      width:56, height:56, colorDark:"#000", colorLight:"#fff"
    }); } catch(e){}
  }

  /* ── Add chip ── */
  function addChip(e, fresh){
    var w = document.getElementById("mosaic"); if(!w) return;
    var el = document.createElement("div");
    el.className = "chip " + (fresh ? "fresh" : styles[sci++ % styles.length]);
    el.textContent = e.name;
    if(e.future) el.setAttribute("data-future", "\u2022 " + e.future);
    if(fresh) w.prepend(el); else w.appendChild(el);
    while(w.children.length > 300) w.removeChild(w.lastChild);
  }

  /* ── Spotlight queue ── */
  function qSpot(e){ spotQ.push(e); if(!busy) nextSpot(); }
  function nextSpot(){
    if(!spotQ.length){ busy=false; return; }
    busy=true; playSpot(spotQ.shift()); setTimeout(nextSpot, 5800);
  }
  function playSpot(e){
    var p = e.name.trim().split(/\s+/);
    document.getElementById("splFirst").textContent = p[0]||"";
    document.getElementById("splLast").textContent  = p.slice(1).join(" ")||"";
    var fb = document.getElementById("splFutureBox");
    var ft = document.getElementById("splFutureTxt");
    if(e.future){ ft.textContent = e.future; fb.style.display="block"; }
    else{ fb.style.display="none"; }
    buildRays(); burstParticles();
    var sp = document.getElementById("spotlight");
    sp.classList.add("on");
    setTimeout(function(){ sp.classList.remove("on"); }, 5300);
  }

  function buildRays(){
    var b = document.getElementById("splRays"); b.innerHTML="";
    for(var i=0;i<24;i++){
      var r=document.createElement("div"); r.className="spl-ray";
      r.style.cssText="transform:rotate("+(i*(360/24))+"deg);height:"+(30+Math.random()*28)+"vh;"+
        "opacity:"+(0.08+Math.random()*.2)+";animation-delay:"+(Math.random()*.3)+"s";
      b.appendChild(r);
    }
  }
  function burstParticles(){
    var c=document.getElementById("splPrts"); c.innerHTML="";
    var cols=["#00B4E6","#E800C8","#1A2A5E","#fff","#33B6FA"];
    for(var i=0;i<80;i++){
      var el=document.createElement("div"); el.className="spp";
      var a=Math.random()*Math.PI*2, d=100+Math.random()*380;
      el.style.cssText="width:"+(4+Math.random()*9)+"px;height:"+(4+Math.random()*9)+"px;"+
        "background:"+cols[Math.floor(Math.random()*cols.length)]+";"+
        "left:50%;top:45%;--dx:"+(Math.cos(a)*d)+"px;--dy:"+(Math.sin(a)*d)+"px;"+
        "animation-duration:"+(1+Math.random()*1.4)+"s;"+
        "animation-delay:"+(Math.random()*.35)+"s";
      c.appendChild(el);
    }
  }

  /* ── Export ── */
  function doExport(){
    if(!db){ alert("לא מחובר ל-Firebase"); return; }
    db.ref("k26b").once("value",function(snap){
      var rows=[]; snap.forEach(function(c){ rows.push(c.val()); });
      var BOM="\uFEFF";
      var hdr="\u05DE\u05E1\u05E4\u05E8,\u05E9\u05DD \u05DE\u05DC\u05D0,\u05D0\u05D9\u05E4\u05D4 \u05D1\u05E2\u05D5\u05D3 5 \u05E9\u05E0\u05D9\u05DD,\u05E9\u05E2\u05EA \u05DB\u05E0\u05D9\u05E1\u05D4,\u05EA\u05D0\u05E8\u05D9\u05DA";
      var lines=rows.map(function(r,i){
        return (i+1)+',"'+(r.name||'')+'","'+(r.future||'')+'","'+(r.t||'')+'","'+(r.ts?r.ts.split("T")[0]:'')+ '"';
      });
      var csv=BOM+[hdr].concat(lines).join("\n");
      var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a"); a.href=url;
      a.download="atidim-knes26-"+new Date().toISOString().slice(0,10)+".csv";
      a.click(); URL.revokeObjectURL(url);
    });
  }
  window.doExport = doExport;
  window.goFS = function(){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  };

  /* ── Firebase listener ── */
  function startListening(){
    var first=true;
    db.ref("k26b").on("value",function(snap){
      if(first){
        first=false;
        var all=[];
        snap.forEach(function(c){ all.push(Object.assign({_k:c.key},c.val())); });
        all.sort(function(a,b){ return a.ts<b.ts?-1:1; });
        all.forEach(function(e){ known[e._k]=true; addChip(e,false); allRegs.push(e); });
        setCount(all.length);
      }
    });
    db.ref("k26b").on("child_added",function(snap){
      if(known[snap.key]) return;
      known[snap.key]=true;
      var e=Object.assign({_k:snap.key},snap.val());
      allRegs.push(e);
      qSpot(e);
      addChip(e,true);
      db.ref("k26b").once("value",function(s){ setCount(s.numChildren()); });
    });
  }

  /* ── Boot ── */
  injectLogos();
  drawQR();
  startListening();
});
</script>
</body>
</html>
